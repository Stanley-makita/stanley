<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistente de Emissão de Minutas Habitacionais</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="home" class="panel home">
        <div>
          <p class="eyebrow">CAIXA</p>
          <h1>Assistente de Emissão de Minutas Habitacionais</h1>
        </div>
        <button id="startButton" class="primary">Nova Minuta</button>
      </section>

      <section id="wizard" class="panel hidden" aria-live="polite">
        <div class="topbar">
          <button id="backButton" class="ghost" type="button">Voltar</button>
          <span id="stepCounter"></span>
        </div>
        <h2 id="questionTitle"></h2>
        <div id="options" class="options"></div>
      </section>

      <section id="result" class="panel hidden" aria-live="polite">
        <p class="eyebrow">Minuta encontrada</p>
        <h2 id="minutaName"></h2>
        <p id="copyPath" class="muted"></p>
        <div class="actions">
          <button id="openButton" class="primary" type="button">ABRIR</button>
          <button id="copyButton" class="secondary" type="button">GERAR CÓPIA</button>
        </div>
        <button id="newButton" class="ghost" type="button">Nova pesquisa</button>
      </section>

      <section id="errorBox" class="error hidden"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
